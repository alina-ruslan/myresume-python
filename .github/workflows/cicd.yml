name: Build and push to ecr 

on:
  push:
    #pull_request:
      #branches: ['main','dev']
      branches: ['main']


job: 
   build-scan:
   runs-on: ubuntu-latest
   steps:
     - name: checkout the code
       uses: actions/checkout@v7
     - name: Trivy Scan 
       uses: aquasecurity/trivy-action@v0.36.0
       with:
        scan-type: 'fs'
        severity: 'CRITICAL'
        exit-code: '1'
     - name: Build Docker image
       run: docker build -t 982081084137.dkr.ecr.us-east-1.amazonaws.com/dev:latest .
     - name: scan docker image
       uses: aquasecurity/trivy-action@0.28.0
       with:
          image-ref: 982081084137.dkr.ecr.us-east-1.amazonaws.com/dev:latest .
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
     - name: Push image to ecr 
         run: echo "pushing image to ecr"  